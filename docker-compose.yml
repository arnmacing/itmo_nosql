services:
  app:
    build:
      context: .
    env_file:
      - .env.local
    depends_on:
      - redis
    ports:
      - "${APP_PORT}:${APP_PORT}"
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--port", "${REDIS_PORT}"]
    env_file:
      - .env.local
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
