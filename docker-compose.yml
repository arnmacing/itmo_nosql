services:
  app:
    build:
      context: .
    env_file:
      - .env.local
    depends_on:
      - redis
      - mongodb
    ports:
      - "${APP_PORT}:${APP_PORT}"
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--port", "${REDIS_PORT}"]
    env_file:
      - .env.local
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
  mongodb:
    image: mongo:7
    command: [ "mongod", "--bind_ip_all", "--port", "${MONGODB_PORT}" ]
    env_file:
      - .env.local
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGODB_USER}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGODB_PASSWORD}"
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"